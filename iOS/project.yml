name: CellarLog
options:
  bundleIdPrefix: com.shimondeitel.cellarlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  CellarLog:
    type: application
    platform: iOS
    sources:
      - path: CellarLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cellarlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: CellarLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CellarLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CellarLogTests
      - path: CellarLog.storekit
    dependencies:
      - target: CellarLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cellarlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CellarLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CellarLogUITests
    dependencies:
      - target: CellarLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.cellarlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  CellarLog:
    build:
      targets:
        CellarLog: all
        CellarLogTests: [test]
        CellarLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: CellarLog.storekit
    test:
      config: Debug
      storeKitConfiguration: CellarLog.storekit
      targets:
        - CellarLogTests
        - CellarLogUITests
    archive:
      config: Release
